<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ConnectHub</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>ConnectHub</h1>

        <p class="subtitle">
            Create your account
        </p>

        <form id="registerForm">

            <input
                type="text"
                id="name"
                placeholder="Full Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

</div>

<script src="js/register.js"></script>
<div id="toast"></div>

</body>
</html>
